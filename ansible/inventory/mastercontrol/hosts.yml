---
# MasterControl Inventory - Group & Variable Definitions
# Hosts are auto-discovered by gcp_compute.yml dynamic inventory
# This file only defines groups and connection settings
#
# Control plane bot - DM only, no group access
# Only accessible by BroAwn (Telegram ID: 319535690)

all:
  vars:
    ansible_user: addheputra
    ansible_ssh_private_key_file: ~/.ssh/mastercontrol-gcp
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_become: true
    ansible_become_method: sudo
    ansible_become_user: root
  children:
    mastercontrol:
      # Hosts populated dynamically by gcp_compute.yml
      # VMs with labels: role=mastercontrol, environment=staging
      hosts: {}