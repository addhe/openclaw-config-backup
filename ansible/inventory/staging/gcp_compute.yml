---
# GCP Dynamic Inventory Configuration for Staging
# =====================================
# Requires: ansible-collection-google-cloud
# Install: ansible-galaxy collection install google.cloud

plugin: gcp_compute
projects:
  - "{{ gcp_project_id }}"
filters: []
zones:
  - "{{ gcp_zone }}"
auth_kind: application
scopes:
  - "https://www.googleapis.com/auth/compute.readonly"

# Group instances by labels
keyed_groups:
  - key: labels.environment
    prefix: env
    separator: "_"
  - key: labels.application
    prefix: app
    separator: "_"
  - key: labels.role
    prefix: role
    separator: "_"
  - key: zone
    prefix: zone
    separator: "_"

# Host variables from labels
compose:
  ansible_host: networkInterfaces[0].accessConfigs[0].natIP
  internal_ip: networkInterfaces[0].networkIP
  instance_name: name
  instance_tags: tags.items

# Filter only staging instances
fail_on_errors: true