---
# =====================================
# GCP Configuration - Staging
# =====================================

# GCP Project
gcp_project_id: "{{ vault_gcp_project_id }}"
gcp_region: "asia-southeast2"  # Jakarta
gcp_zone: "asia-southeast2-a"

# GCP Service Account (from vault)
gcp_service_account_email: "{{ vault_gcp_service_account_email }}"
gcp_service_account_key: "{{ vault_gcp_service_account_key }}"

# Network
gcp_network: "openclaw-staging-network"
gcp_subnetwork: "openclaw-staging-subnet"

# Labels (for resource management)
gcp_common_labels:
  environment: "staging"
  managed_by: "ansible"
  owner: "{{ owner }}"
  project: "{{ org_name }}"
  cost_center: "staging-infrastructure"

# Tags
gcp_common_tags:
  - "staging"
  - "ansible-managed"