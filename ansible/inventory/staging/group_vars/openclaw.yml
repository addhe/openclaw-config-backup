---
# =====================================
# OpenClaw Configuration - Staging
# =====================================

# Application
openclaw_version: "latest"
openclaw_user: "openclaw"
openclaw_group: "openclaw"
openclaw_workspace: "/home/openclaw/.openclaw/workspace"

# Service Configuration
openclaw_service_name: "openclaw-gateway"
openclaw_service_description: "OpenClaw Gateway - Staging"
openclaw_service_after: "network.target"

# Gateway
gateway_port: 8080
gateway_bind: "lan"  # Use 'lan' for network-accessible, 'loopback' for localhost only
gateway_mode: "local"

# Telegram (from vault - per worker bot token)
# Uses vault_telegram_bot_tokens[role][id] structure
telegram_bot_token: "{{ vault_telegram_bot_tokens[gcp_worker_role][gcp_worker_id] }}"
telegram_allowed_users: "{{ vault_telegram_allowed_users }}"

# Gateway Auth (from vault)
gateway_token: "{{ vault_gateway_token }}"

# OpenAI (from vault)
openai_api_key: "{{ vault_openai_api_key }}"

# =====================================
# Ollama Configuration
# =====================================

# Local Ollama settings
ollama_port: 11434
ollama_user: ollama
ollama_group: ollama
ollama_models:
  - llama3.2:1b  # Small local model for fallback

# Ollama Cloud API Configuration
ollama_cloud_enabled: true
ollama_cloud_api_key: "{{ vault_ollama_cloud_api_key }}"
ollama_cloud_host: "https://ollama.com"
ollama_cloud_model: "glm-5"

# OpenClaw Model Configuration
# Use ollama/<model> format - provider config handles cloud vs local
openclaw_model: "ollama/{{ ollama_cloud_model }}"

# Logging
openclaw_log_level: "debug"  # More verbose for staging