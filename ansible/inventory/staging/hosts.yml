---
# Staging Environment Inventory
# =====================================
# This inventory uses GCP dynamic inventory
# Static inventory for localhost (control node) only

all:
  children:
    localhost:
      hosts:
        127.0.0.1:
          ansible_connection: local
    
    staging:
      children:
        openclaw_staging:
      vars:
        environment: staging
        env_short: stg