---
# Playbook: Provision OpenClaw VM
# ================================
# This playbook provisions a GCP spot instance for OpenClaw
#
# Usage:
#   ansible-playbook playbooks/provision/openclaw-vm.yml -e "deploy_env=staging"
#   ansible-playbook playbooks/provision/openclaw-vm.yml -e "deploy_env=production"

- name: Provision OpenClaw VM
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/staging/group_vars/all.yml"
    - "{{ playbook_dir }}/../inventory/staging/group_vars/gcp.yml"
    - "{{ playbook_dir }}/../inventory/staging/group_vars/vault.yml"

  pre_tasks:
    - name: Display environment
      debug:
        msg: "Provisioning for environment: {{ deploy_env | default('staging') }}"

    - name: Set environment fact
      set_fact:
        deploy_env: "{{ deploy_env | default('staging') }}"
        application: "openclaw"

  roles:
    - role: gcp-compute
      vars:
        gcp_instance_name_prefix: "{{ org_short }}-{{ application }}-{{ env_short }}"

  post_tasks:
    - name: Display provisioned instances
      debug:
        msg: |
          ================================
          Provisioning Complete!
          ================================
          Instance Name: {{ instance_name }}
          External IP: {{ compute_instance.networkInterfaces[0].accessConfigs[0].natIP }}
          Internal IP: {{ compute_instance.networkInterfaces[0].networkIP }}
          Environment: {{ deploy_env }}
          ================================
          Next steps:
          1. Apply base role: ansible-playbook playbooks/deploy/base.yml
          2. Deploy OpenClaw: ansible-playbook playbooks/deploy/openclaw.yml
          ================================