---
# Playbook: Deploy OpenClaw
# =========================
# This playbook deploys OpenClaw to configured VMs
#
# Usage:
#   ansible-playbook playbooks/deploy/openclaw.yml -i inventory/staging/hosts.yml -e "deploy_env=staging"

- name: Deploy OpenClaw
  hosts: "{{ deploy_env | default('staging') }}"
  become: true
  gather_facts: true

  vars_files:
    - "{{ playbook_dir }}/../inventory/staging/group_vars/all.yml"
    - "{{ playbook_dir }}/../inventory/staging/group_vars/openclaw.yml"
    - "{{ playbook_dir }}/../inventory/staging/group_vars/vault.yml"

  pre_tasks:
    - name: Wait for SSH
      wait_for_connection:
        timeout: 300

    - name: Gather facts
      setup:

  roles:
    - role: openclaw-prereq
      tags:
        - prereq
        - nodejs

    - role: openclaw-install
      tags:
        - install
        - openclaw

    - role: openclaw-config
      tags:
        - config
        - openclaw

  post_tasks:
    - name: Display completion
      debug:
        msg: |
          ================================
          OpenClaw Deployment Complete!
          ================================
          Environment: {{ deploy_env }}
          Gateway Port: {{ gateway_port }}
          Model: {{ openclaw_model }}
          ================================
          Test:
          curl http://{{ ansible_host }}:{{ gateway_port }}/status
          ================================