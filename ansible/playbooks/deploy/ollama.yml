---
# Playbook: Deploy Ollama
# =======================
# This playbook deploys Ollama LLM runtime to configured VMs
#
# Usage:
#   ansible-playbook playbooks/deploy/ollama.yml -i inventory/staging/hosts.yml -e "deploy_env=staging"

- name: Deploy Ollama
  hosts: "{{ deploy_env | default('staging') }}"
  become: true
  gather_facts: true

  vars_files:
    - "{{ playbook_dir }}/../inventory/staging/group_vars/all.yml"

  pre_tasks:
    - name: Wait for SSH
      wait_for_connection:
        timeout: 300

    - name: Gather facts
      setup:

  roles:
    - role: ollama
      tags:
        - ollama
        - llm

  post_tasks:
    - name: Display completion
      debug:
        msg: |
          ================================
          Ollama Deployment Complete!
          ================================
          Environment: {{ deploy_env }}
          ================================
          Test:
          ssh {{ ansible_user }}@{{ ansible_host }} "ollama list"
          ================================