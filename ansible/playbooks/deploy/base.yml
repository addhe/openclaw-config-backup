---
# Playbook: Deploy Base Configuration
# ====================================
# This playbook applies the base role to provisioned VMs
#
# Usage:
#   ansible-playbook playbooks/deploy/base.yml -i inventory/staging/hosts.yml -e "deploy_env=staging"

- name: Apply base configuration
  hosts: "{{ deploy_env | default('staging') }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for SSH
      wait_for_connection:
        timeout: 300

    - name: Gather facts
      setup:

  roles:
    - role: base
      tags:
        - base
        - security
        - hardening

  post_tasks:
    - name: Display completion
      debug:
        msg: "Base configuration completed for {{ inventory_hostname }}"